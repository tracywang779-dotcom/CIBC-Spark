<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark — Workflows</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/workflows.css" />
  <link rel="stylesheet" href="css/workflow-detail.css" />
</head>
<body class="wf-hub">
  <div id="nav"></div>

  <main class="spark-container wf-hub-page" id="main-content">
    <nav class="wf-hub-breadcrumbs" aria-label="Breadcrumb">
      <a href="index.html" aria-label="Home">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <span class="wf-hub-breadcrumbs__sep" aria-hidden="true">&gt;</span>
      <span class="wf-hub-breadcrumbs__current">Workflows</span>
    </nav>

    <h1 class="wf-hub-title">Guided Workflows</h1>

    <div class="wf-hub-top">
      <div class="wf-hub-panel">
        <h2 class="wf-hub-panel__title">Start a workflow</h2>
        <div class="wf-family-tabs" id="family-tabs" role="tablist" aria-label="Workflow family"></div>
        <div class="wf-workflow-list" id="workflow-list" role="list"></div>
      </div>

      <div class="wf-hub-sidebar">
        <div class="wf-hub-panel">
          <h2 class="wf-hub-panel__title">Your recent runs</h2>
          <div class="wf-recent-runs-list" id="recent-runs"></div>
        </div>
        <div class="wf-tip-card">
          <span class="wf-tip-card__label">Tip</span>
          <p>Low-confidence outputs require an edit before you can mark them verified. Always compare against your source material.</p>
        </div>
      </div>
    </div>

    <section class="wf-in-progress panel-hidden" id="workflow-in-progress" aria-labelledby="in-progress-heading">
      <h2 class="wf-in-progress__title" id="in-progress-heading">Workflow in progress</h2>
      <div id="workflow-body"></div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      mountChrome('workflows');

      const data = getMergedData();
      const params = new URLSearchParams(window.location.search);
      let activeFamily = 'reconciliation';
      let selectedWorkflowId = params.get('id');

      const familyTabsEl = document.getElementById('family-tabs');
      const workflowListEl = document.getElementById('workflow-list');
      const recentRunsEl = document.getElementById('recent-runs');
      const inProgressSection = document.getElementById('workflow-in-progress');
      const workflowBody = document.getElementById('workflow-body');

      const FAMILY_TAB_LABELS = {
        reconciliation: 'Reconciliation',
        'email-approval': 'Email & Approvals'
      };

      const FAMILY_BREADCRUMB = {
        reconciliation: 'Reconciliation',
        'email-approval': 'Email & Approval'
      };

      const RISK_FROM_CONFIDENCE = {
        high: {
          level: 'low',
          label: 'Low Risk',
          title: 'Output appears reliable',
          detail: 'Structured input produced a consistent result. A quick scan against source is still recommended.'
        },
        medium: {
          level: 'medium',
          label: 'Medium Risk',
          title: 'Date range needs verification',
          detail: null
        },
        low: {
          level: 'high',
          label: 'High Risk',
          title: 'Human review required',
          detail: null
        }
      };

      const WORKFLOW_DISPLAY = {
        'discrepancy-explanation': {
          defaultTab: 'document',
          fileName: 'reconciliation_2026_Q2.csv',
          fileSize: '24 KB',
          summary: [
            { label: 'Account', value: 'ACCT-4471902' },
            { label: 'Period', value: '2026-06-15 → 2026-06-29' },
            { label: 'Ledger total', value: '$1,284,502.17' },
            { label: 'Bank statement', value: '$1,284,488.92' },
            { label: 'Variance', value: '$13.25', full: true }
          ]
        },
        'audit-summary': {
          defaultTab: 'document',
          fileName: 'audit_findings_q2_2026.csv',
          fileSize: '18 KB',
          summary: [
            { label: 'Batch', value: 'Q2 2026 audit findings' },
            { label: 'Finding count', value: '14 items' },
            { label: 'Top pattern', value: 'Vendor payment timing' },
            { label: 'Coverage', value: 'Reconciliation · Access · Reporting' }
          ]
        },
        'approval-email': {
          defaultTab: 'text',
          fileName: null,
          summary: [
            { label: 'Item type', value: 'Vendor renewal' },
            { label: 'Amount', value: '$140,000' },
            { label: 'Due date', value: '2026-07-01' },
            { label: 'Boundary', value: 'Check first — elevated risk' }
          ]
        }
      };

      const iconCloud = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></svg>';
      const iconClock = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>';
      const iconInfo = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>';
      const iconUpload = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>';
      const iconRefresh = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>';
      const iconCopy = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>';
      const iconSave = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>';
      const iconBolt = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>';
      const iconX = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true"><path d="M18 6 6 18M6 6l12 12"/></svg>';

      const formatRunDate = (dateStr) => {
        const date = new Date(`${dateStr}T12:00:00`);
        if (Number.isNaN(date.getTime())) return dateStr;
        return date.toLocaleDateString('en-CA', { month: 'short', day: 'numeric', year: 'numeric' });
      };

      const renderRecentRuns = () => {
        const runs = getRecentWorkflowRuns(user);
        recentRunsEl.innerHTML = runs.length
          ? runs.map((run) => `
              <article class="wf-recent-run">
                <span class="wf-recent-run__name">${run.name}</span>
                <div class="wf-recent-run__meta">
                  <span>${formatRunDate(run.date)}</span>
                  ${renderConfidencePill(run.confidence, true)}
                  <span>~${run.timeSavedMinutes} min saved</span>
                </div>
              </article>
            `).join('')
          : '<p class="wf-workflow-list-item__summary">No recent runs yet. Start a workflow below.</p>';
      };

      const renderFamilyTabs = () => {
        familyTabsEl.innerHTML = WORKFLOW_ROLES.map((role) => {
          const isActive = role.family === activeFamily;
          return `
            <button type="button" class="wf-family-tab${isActive ? ' active' : ''}"
                    data-family="${role.family}" role="tab" aria-selected="${isActive}">
              ${FAMILY_TAB_LABELS[role.family] || role.label}
            </button>
          `;
        }).join('');
      };

      const renderWorkflowList = () => {
        const filtered = data.workflows.filter((wf) => wf.family === activeFamily);
        workflowListEl.innerHTML = filtered.map((workflow) => {
          const isSelected = workflow.id === selectedWorkflowId;
          return `
            <button type="button" class="wf-workflow-list-item${isSelected ? ' active' : ''}"
                    data-workflow-id="${workflow.id}" role="listitem">
              <div class="wf-workflow-list-item__head">
                <h3 class="wf-workflow-list-item__name">${workflow.name}</h3>
                ${renderConfidencePill(workflow.mockConfidence, true)}
              </div>
              <p class="wf-workflow-list-item__summary">${workflow.summary}</p>
            </button>
          `;
        }).join('');
      };

      const updateListSelection = () => {
        workflowListEl.querySelectorAll('.wf-workflow-list-item').forEach((item) => {
          item.classList.toggle('active', item.dataset.workflowId === selectedWorkflowId);
        });
      };

      const syncFamilyForWorkflow = (workflowId) => {
        const workflow = data.workflows.find((wf) => wf.id === workflowId);
        if (workflow && workflow.family !== activeFamily) {
          activeFamily = workflow.family;
          renderFamilyTabs();
          renderWorkflowList();
        }
      };

      const setWorkflowInUrl = (workflowId, promptOverride = null, push = true) => {
        const url = new URL(window.location.href);
        if (workflowId) {
          url.searchParams.set('id', workflowId);
          if (promptOverride) url.searchParams.set('prompt', promptOverride);
          else url.searchParams.delete('prompt');
        } else {
          url.searchParams.delete('id');
          url.searchParams.delete('prompt');
        }

        if (push) {
          history.pushState({ id: workflowId }, '', url);
        } else {
          history.replaceState({ id: workflowId }, '', url);
        }
      };

      const selectWorkflow = (workflowId, promptOverride = undefined, push = true) => {
        selectedWorkflowId = workflowId;
        const prompt = promptOverride !== undefined ? promptOverride : null;

        if (workflowId) {
          syncFamilyForWorkflow(workflowId);
          updateListSelection();
          setWorkflowInUrl(workflowId, prompt, push);
          renderWorkflowDetail(workflowId, prompt);
          inProgressSection.classList.remove('panel-hidden');
          inProgressSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
          updateListSelection();
          setWorkflowInUrl(null, null, push);
          workflowBody.innerHTML = '';
          inProgressSection.classList.add('panel-hidden');
          document.title = 'Spark — Workflows';
        }
      };

      const renderWorkflowDetail = (workflowId, promptOverride) => {
        const workflow = data.workflows.find((wf) => wf.id === workflowId);

        if (!workflow) {
          document.title = 'Spark — Workflow not found';
          workflowBody.innerHTML = `
            <nav class="wf-breadcrumbs" aria-label="Breadcrumb">
              <a href="workflows.html">Workflows</a>
            </nav>
            <div class="wf-not-found">
              ${renderEmptyState(
                'We could not find that workflow. It may have been removed or the link is incorrect.',
                {
                  icon: '&#128203;',
                  actionHtml: '<a class="spark-btn-primary" href="workflows.html">Return to Workflows</a>'
                }
              )}
            </div>
          `;
          return;
        }

        const display = WORKFLOW_DISPLAY[workflow.id] || {
          defaultTab: 'text',
          fileName: null,
          summary: []
        };
        const familyLabel = FAMILY_BREADCRUMB[workflow.family] || workflow.family;
        const riskMeta = RISK_FROM_CONFIDENCE[workflow.mockConfidence] || RISK_FROM_CONFIDENCE.medium;
        const riskDetailText = riskMeta.detail || workflow.confidenceNote || '';
        const boundaryTags = (workflow.boundaryRecap || []).join(' · ');
        const source = workflow.promptSource || {};
        const estMinutes = workflow.estTimeSavedMinutes || 20;

        document.title = `Spark — ${workflow.name}`;

        const summaryHtml = display.summary.map((item) => `
          <div class="wf-summary__item${item.full ? ' wf-summary__item--full' : ''}">
            <label>${item.label}</label>
            <span>${item.value}</span>
          </div>
        `).join('');

        const riskOptionsHtml = ['high', 'medium', 'low'].map((riskLevel) => {
          const confKey = riskLevel === 'low' ? 'high' : riskLevel === 'high' ? 'low' : 'medium';
          const meta = RISK_FROM_CONFIDENCE[confKey];
          const isActive = meta.level === riskMeta.level;
          const detailClass = `wf-risk-detail--${riskMeta.level}`;
          const detailBody = isActive ? `
            <div class="wf-risk-detail ${detailClass}">
              <h4>
                <span class="wf-risk-dot wf-risk-dot--${riskMeta.level}" aria-hidden="true"></span>
                ${riskMeta.title}
              </h4>
              <p>${riskDetailText}</p>
              <a href="#" id="where-in-source">→ Where in source</a>
            </div>
          ` : '';

          return `
            <div class="wf-risk-option${isActive ? ' active' : ' inactive'}" data-risk="${riskLevel}">
              <div class="wf-risk-option__row">
                <span class="wf-risk-radio" aria-hidden="true"></span>
                <span class="wf-risk-option__label">${meta.label}</span>
              </div>
              ${detailBody}
            </div>
          `;
        }).join('');

        workflowBody.innerHTML = `
          <nav class="wf-breadcrumbs" aria-label="Breadcrumb">
            <a href="workflows.html">Workflows</a>
            <span class="wf-breadcrumbs__sep" aria-hidden="true">&gt;</span>
            <span>${familyLabel}</span>
            <span class="wf-breadcrumbs__sep" aria-hidden="true">&gt;</span>
            <span class="wf-breadcrumbs__current">${workflow.name}</span>
          </nav>

          <div class="wf-boundary-strip" role="note">
            <span class="wf-boundary-strip__label">Boundaries · ${workflow.boundaryTask || workflow.name}</span>
            <span class="wf-boundary-strip__tags">${boundaryTags}</span>
            <a href="trust-center.html#boundaries">See full Boundaries →</a>
          </div>

          <div class="success-banner panel-hidden" id="use-success" role="status">
            <span aria-hidden="true">&#10003;</span>
            <span class="success-banner__text">Your verified output is ready to use. This session&apos;s audit trail has been recorded.</span>
          </div>

          <div class="wf-grid">
            <div class="wf-col wf-col--main">
              <div class="wf-tabs" role="tablist" aria-label="Input type">
                <button type="button" class="wf-tab${display.defaultTab === 'document' ? ' active' : ''}" role="tab" data-tab="document" aria-selected="${display.defaultTab === 'document'}">Document</button>
                <button type="button" class="wf-tab${display.defaultTab === 'image' ? ' active' : ''}" role="tab" data-tab="image" aria-selected="false">Image</button>
                <button type="button" class="wf-tab${display.defaultTab === 'text' ? ' active' : ''}" role="tab" data-tab="text" aria-selected="${display.defaultTab === 'text'}">Text</button>
              </div>

              <div class="wf-tab-panel${display.defaultTab === 'document' ? ' active' : ''}" data-panel="document" role="tabpanel">
                <div id="file-empty" class="wf-upload-empty">
                  <p>Upload a document or load sample data for the demo.</p>
                  <button type="button" class="wf-sample-btn" id="btn-sample-doc" style="width:auto;display:inline-block;">Load sample data</button>
                </div>
                <div id="file-loaded" class="panel-hidden">
                  <div class="wf-file-card">
                    <div class="wf-file-card__icon">${iconCloud}</div>
                    <div class="wf-file-card__meta">
                      <p class="wf-file-card__name" id="file-name">${display.fileName || 'sample.csv'}</p>
                      <p class="wf-file-card__sub" id="file-meta">${display.fileSize || ''} · uploaded just now</p>
                    </div>
                    <button type="button" class="wf-file-remove" id="btn-remove-file" aria-label="Remove file">${iconX}</button>
                  </div>
                </div>
              </div>

              <div class="wf-tab-panel${display.defaultTab === 'image' ? ' active' : ''}" data-panel="image" role="tabpanel">
                <div class="wf-upload-empty">
                  <p>Image upload is not available in this prototype.</p>
                </div>
              </div>

              <div class="wf-tab-panel${display.defaultTab === 'text' ? ' active' : ''}" data-panel="text" role="tabpanel">
                <label class="sr-only" for="source-input">Source material</label>
                <textarea class="wf-textarea wf-textarea--source" id="source-input" rows="5" placeholder="Paste reconciliation data, email thread, or notes here…"></textarea>
                <button type="button" class="wf-sample-btn" id="btn-sample-text">Load sample input</button>
              </div>

              <div class="wf-summary panel-hidden" id="summary-card">
                <div class="wf-summary__grid" id="summary-grid">${summaryHtml}</div>
              </div>

              <div class="wf-prompt-block">
                <button type="button" class="wf-prompt-toggle" id="prompt-toggle" aria-expanded="false">Edit prompt ↓</button>
                <div class="wf-prompt-panel panel-hidden" id="prompt-panel">
                  <label class="sr-only" for="prompt-input">Prompt</label>
                  <textarea class="wf-textarea" id="prompt-input" rows="3">${promptOverride || workflow.prompt}</textarea>
                  <p class="wf-prompt-attribution">Prompt from <strong>${source.title || 'a peer case'}</strong> · ${source.upvotes || 0} upvotes</p>
                </div>
              </div>

              <div class="wf-run-wrap">
                <button type="button" class="wf-run-btn" id="btn-run">
                  ${iconBolt}
                  <span id="run-label">Run with AI</span>
                </button>
              </div>

              <section class="wf-output-section panel-hidden" id="output-section" aria-labelledby="output-label">
                <div class="wf-output-header">
                  <span class="wf-output-label" id="output-label">AI Output</span>
                  <span class="wf-output-time" id="output-time">${iconClock} generated just now</span>
                </div>
                <label class="sr-only" for="output-text">Review and edit the output before verifying</label>
                <textarea class="wf-textarea wf-textarea--output" id="output-text" rows="8"></textarea>
                <p class="wf-guard-hint panel-hidden" id="low-guard-hint">Low-confidence output: edit at least one line before you can mark as verified.</p>
                <div class="wf-output-actions">
                  <button type="button" class="wf-btn-outline" id="btn-copy" disabled>${iconCopy} Copy</button>
                  <button type="button" class="wf-btn-solid" id="btn-save-output" disabled>${iconSave} Save</button>
                </div>
              </section>

              <section class="wf-verify-section panel-hidden" id="verify-section" aria-labelledby="verify-heading">
                <h3 class="wf-verify-heading" id="verify-heading">Verification</h3>
                <button type="button" class="wf-compare-toggle" id="compare-toggle" aria-expanded="false">
                  Compare with source
                  <span aria-hidden="true">↓</span>
                </button>
                <div class="wf-compare-panel panel-hidden" id="compare-panel">
                  <div>
                    <h4>Source material</h4>
                    <textarea class="wf-textarea" id="source-mirror" rows="6" readonly></textarea>
                  </div>
                  <div>
                    <h4>AI output</h4>
                    <textarea class="wf-textarea" id="output-mirror" rows="6" readonly></textarea>
                  </div>
                </div>
                <ul class="wf-checklist" id="checklist"></ul>
                <button type="button" class="wf-verify-btn" id="btn-verify" disabled>Mark as verified</button>
              </section>
            </div>

            <div class="wf-sidebar">
              <div class="wf-col wf-col--risk">
                <h2 class="wf-col__title">
                  Risk Assessment
                  ${iconInfo}
                </h2>
                <div class="wf-risk-body">
                  <div class="wf-risk-placeholder" id="risk-placeholder">Run with AI to see a risk assessment for this output.</div>
                  <div class="wf-risk-options panel-hidden" id="risk-options">${riskOptionsHtml}</div>
                </div>
                <p class="wf-risk-footer panel-hidden" id="risk-footer">
                  ${iconRefresh}
                  <span>Risk re-evaluates every time you edit input or output.</span>
                </p>
              </div>

              <div class="wf-col wf-col--share">
                <h2 class="wf-col__title wf-col__title--caps">
                  ${iconUpload}
                  Share this run?
                </h2>
                <p class="wf-share-desc">Others can learn from your run if you submit it to Peer Cases. Data is anonymized before sharing.</p>
                <div class="wf-share-verified-badge panel-hidden" id="verified-badge">&#10003; Verified — ready to share</div>
                <div class="wf-share-toggles">
                  <div class="wf-toggle-row">
                    <span>Include the prompt used</span>
                    <label class="wf-toggle">
                      <input type="checkbox" id="toggle-prompt" checked />
                      <span class="wf-toggle__track"></span>
                    </label>
                  </div>
                  <div class="wf-toggle-row">
                    <span>Include time-saved estimate (~${estMinutes} min)</span>
                    <label class="wf-toggle">
                      <input type="checkbox" id="toggle-time" checked />
                      <span class="wf-toggle__track"></span>
                    </label>
                  </div>
                </div>
                <button type="button" class="wf-preview-btn" id="btn-preview" disabled>Preview submission</button>
                <p class="wf-share-footer">You can still decide on the Peer Cases page.</p>
              </div>
            </div>
          </div>
        `;

        initWorkflowDetailInteractions(workflow);
      };

      const initWorkflowDetailInteractions = (workflow) => {
        const confidence = workflow.mockConfidence;
        const isLow = confidence === 'low';
        let initialOutput = '';
        let hasRun = false;
        let isVerified = false;

        const sourceInput = document.getElementById('source-input');
        const promptInput = document.getElementById('prompt-input');
        const outputSection = document.getElementById('output-section');
        const verifySection = document.getElementById('verify-section');
        const outputText = document.getElementById('output-text');
        const sourceMirror = document.getElementById('source-mirror');
        const outputMirror = document.getElementById('output-mirror');
        const checklistEl = document.getElementById('checklist');
        const btnVerify = document.getElementById('btn-verify');
        const btnRun = document.getElementById('btn-run');
        const runLabel = document.getElementById('run-label');
        const lowGuardHint = document.getElementById('low-guard-hint');
        const btnCopy = document.getElementById('btn-copy');
        const btnSaveOutput = document.getElementById('btn-save-output');
        const btnPreview = document.getElementById('btn-preview');
        const riskPlaceholder = document.getElementById('risk-placeholder');
        const riskOptions = document.getElementById('risk-options');
        const riskFooter = document.getElementById('risk-footer');
        const verifiedBadge = document.getElementById('verified-badge');
        const fileEmpty = document.getElementById('file-empty');
        const fileLoaded = document.getElementById('file-loaded');
        const summaryCard = document.getElementById('summary-card');
        const compareToggle = document.getElementById('compare-toggle');
        const comparePanel = document.getElementById('compare-panel');
        const display = WORKFLOW_DISPLAY[workflow.id] || { fileName: null };

        if (isLow) lowGuardHint.classList.remove('panel-hidden');

        checklistEl.innerHTML = workflow.checklist
          .map((item, index) => `
            <li>
              <label>
                <input type="checkbox" data-index="${index}" />
                <span>${item}</span>
              </label>
            </li>
          `).join('');

        const allChecksComplete = () =>
          [...checklistEl.querySelectorAll('input[type="checkbox"]')].every((box) => box.checked);

        const outputWasEdited = () => outputText.value.trim() !== initialOutput.trim();

        const syncMirrors = () => {
          sourceMirror.value = sourceInput.value;
          outputMirror.value = outputText.value;
        };

        const updateVerifyButton = () => {
          if (isVerified) return;
          const checksOk = allChecksComplete();
          const editOk = !isLow || outputWasEdited();
          btnVerify.disabled = !(checksOk && editOk);
        };

        const updateOutputActions = () => {
          btnCopy.disabled = !hasRun;
          btnSaveOutput.disabled = !isVerified;
          btnPreview.disabled = !isVerified;
        };

        const setSampleLoaded = () => {
          sourceInput.value = workflow.sampleInput;
          if (display.fileName) {
            fileEmpty.classList.add('panel-hidden');
            fileLoaded.classList.remove('panel-hidden');
            summaryCard.classList.remove('panel-hidden');
          }
          syncMirrors();
        };

        const clearSampleFile = () => {
          fileEmpty.classList.remove('panel-hidden');
          fileLoaded.classList.add('panel-hidden');
          summaryCard.classList.add('panel-hidden');
        };

        const formatOutputTime = () => {
          const now = new Date();
          const hh = String(now.getHours()).padStart(2, '0');
          const mm = String(now.getMinutes()).padStart(2, '0');
          document.getElementById('output-time').innerHTML = `${iconClock} generated ${hh}:${mm}`;
        };

        const revealPostRun = () => {
          outputSection.classList.remove('panel-hidden');
          verifySection.classList.remove('panel-hidden');
          riskPlaceholder.classList.add('panel-hidden');
          riskOptions.classList.remove('panel-hidden');
          riskFooter.classList.remove('panel-hidden');
          btnCopy.disabled = false;
          formatOutputTime();
        };

        const buildAuditRun = () => ({
          workflowId: workflow.id,
          workflowName: workflow.name,
          prompt: promptInput.value.trim(),
          sourceInput: sourceInput.value.trim(),
          originalOutput: initialOutput,
          finalOutput: outputText.value.trim(),
          confidence: workflow.mockConfidence,
          confidenceNote: workflow.confidenceNote || null,
          checklistCompleted: workflow.checklist.filter((_, i) =>
            checklistEl.querySelector(`input[data-index="${i}"]`)?.checked
          ),
          verifiedAt: new Date().toISOString(),
          submittedBy: user.name,
          department: user.department
        });

        document.querySelectorAll('.wf-tab').forEach((tab) => {
          tab.addEventListener('click', () => {
            const target = tab.dataset.tab;
            document.querySelectorAll('.wf-tab').forEach((t) => {
              const active = t.dataset.tab === target;
              t.classList.toggle('active', active);
              t.setAttribute('aria-selected', active);
            });
            document.querySelectorAll('.wf-tab-panel').forEach((panel) => {
              panel.classList.toggle('active', panel.dataset.panel === target);
            });
          });
        });

        document.getElementById('prompt-toggle').addEventListener('click', () => {
          const panel = document.getElementById('prompt-panel');
          const open = panel.classList.toggle('panel-hidden');
          document.getElementById('prompt-toggle').setAttribute('aria-expanded', !open);
          document.getElementById('prompt-toggle').textContent = open ? 'Edit prompt ↓' : 'Edit prompt ↑';
        });

        document.getElementById('btn-sample-doc')?.addEventListener('click', setSampleLoaded);
        document.getElementById('btn-sample-text')?.addEventListener('click', setSampleLoaded);
        document.getElementById('btn-remove-file')?.addEventListener('click', () => {
          clearSampleFile();
          sourceInput.value = '';
          syncMirrors();
        });

        compareToggle.addEventListener('click', () => {
          const open = comparePanel.classList.toggle('panel-hidden');
          compareToggle.setAttribute('aria-expanded', !open);
          compareToggle.querySelector('span').textContent = open ? '↓' : '↑';
        });

        document.getElementById('where-in-source')?.addEventListener('click', (event) => {
          event.preventDefault();
          comparePanel.classList.remove('panel-hidden');
          compareToggle.setAttribute('aria-expanded', 'true');
          compareToggle.querySelector('span').textContent = '↑';
          comparePanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        btnRun.addEventListener('click', () => {
          if (hasRun) return;
          if (!sourceInput.value.trim()) {
            sourceInput.focus();
            return;
          }
          btnRun.disabled = true;
          runLabel.innerHTML = '<span class="spinner" aria-hidden="true"></span> Running…';

          setTimeout(() => {
            hasRun = true;
            initialOutput = workflow.mockOutput;
            outputText.value = initialOutput;
            syncMirrors();
            revealPostRun();
            runLabel.textContent = 'Run with AI';
            btnRun.disabled = true;
            updateVerifyButton();
            outputSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 1000);
        });

        checklistEl.addEventListener('change', updateVerifyButton);

        outputText.addEventListener('input', () => {
          outputMirror.value = outputText.value;
          updateVerifyButton();
        });

        sourceInput.addEventListener('input', () => {
          if (hasRun) sourceMirror.value = sourceInput.value;
        });

        btnVerify.addEventListener('click', () => {
          if (btnVerify.disabled) return;
          isVerified = true;
          btnVerify.disabled = true;
          btnVerify.textContent = 'Verified';
          verifiedBadge.classList.remove('panel-hidden');
          updateOutputActions();
        });

        btnCopy.addEventListener('click', async () => {
          if (!hasRun) return;
          try {
            await navigator.clipboard.writeText(outputText.value);
            const prev = btnCopy.innerHTML;
            btnCopy.textContent = 'Copied';
            setTimeout(() => { btnCopy.innerHTML = prev; }, 1500);
          } catch (error) {
            /* clipboard unavailable in some contexts */
          }
        });

        btnSaveOutput.addEventListener('click', () => {
          if (!isVerified) return;
          saveWorkflowRun(buildAuditRun());
          showSuccessBanner(
            'Your verified output is ready to use. This session\u2019s audit trail has been recorded.',
            { targetId: 'use-success', hideClass: 'panel-hidden' }
          );
        });

        btnPreview.addEventListener('click', () => {
          if (!isVerified) return;
          saveWorkflowRun(buildAuditRun());
          window.location.href = `workflow-submit.html?id=${workflow.id}`;
        });

        updateOutputActions();
      };

      familyTabsEl.addEventListener('click', (event) => {
        const tab = event.target.closest('.wf-family-tab');
        if (!tab) return;
        activeFamily = tab.dataset.family;
        renderFamilyTabs();
        renderWorkflowList();
        updateListSelection();
      });

      workflowListEl.addEventListener('click', (event) => {
        const item = event.target.closest('.wf-workflow-list-item');
        if (!item) return;
        selectWorkflow(item.dataset.workflowId);
      });

      window.addEventListener('popstate', () => {
        const nextParams = new URLSearchParams(window.location.search);
        selectedWorkflowId = nextParams.get('id');
        if (selectedWorkflowId) {
          syncFamilyForWorkflow(selectedWorkflowId);
          updateListSelection();
          renderWorkflowDetail(selectedWorkflowId, nextParams.get('prompt'));
          inProgressSection.classList.remove('panel-hidden');
        } else {
          updateListSelection();
          workflowBody.innerHTML = '';
          inProgressSection.classList.add('panel-hidden');
          document.title = 'Spark — Workflows';
        }
      });

      renderFamilyTabs();
      renderWorkflowList();
      renderRecentRuns();

      if (selectedWorkflowId) {
        syncFamilyForWorkflow(selectedWorkflowId);
        renderWorkflowDetail(selectedWorkflowId, params.get('prompt'));
        inProgressSection.classList.remove('panel-hidden');
      }
    }
  </script>
</body>
</html>
