<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark — Learn and Build in PODs</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/ui-v2.css" />
  <style>
    .pod-dept {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 600;
      color: var(--cibc-red);
      margin-bottom: var(--space-2);
    }
    .pod-actions { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-3); }
    .btn-secondary, .btn-text {
      padding: 8px 14px;
      border-radius: var(--radius-button);
      font-size: var(--text-sm);
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition-base);
    }
    .btn-secondary {
      background: var(--cibc-red);
      color: var(--white);
      border: 1px solid var(--cibc-red);
    }
    .btn-secondary:hover { background: var(--cibc-red-dark); }
    .btn-text {
      background: var(--white);
      border: 1px solid var(--gray-200);
      color: var(--gray-900);
    }
    .btn-text:hover { border-color: var(--cibc-red); color: var(--cibc-red); }
    .pod-create {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      border: 2px dashed var(--gray-200);
      border-radius: var(--radius-card);
      text-align: center;
      padding: var(--panel-pad);
      color: var(--gray-500);
      cursor: default;
      background: var(--white);
    }
    .pod-create__icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: 1px solid var(--gray-200);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: var(--text-h3);
      margin-bottom: var(--space-2);
      color: var(--gray-400);
    }
    .pod-create__title { font-size: var(--text-body); font-weight: 600; color: var(--gray-700); margin: 0 0 var(--space-1); }
    .pod-create__desc { font-size: var(--text-sm); margin: 0; line-height: 1.4; }
  </style>
</head>
<body class="ui-v2">
  <div id="nav"></div>

  <main class="spark-container explore-page">
    <a class="explore-back" href="explore.html">&larr; Back to Explore</a>

    <header class="explore-head">
      <h1 class="explore-title">Learn and Build in PODs</h1>
      <p class="explore-lead">PODs bring together employees who are ready to go further with AI. Learn from peers, share what&rsquo;s working, and collaborate on ideas, workflows, or tools that could help your team.</p>
    </header>

    <div class="mini-grid" id="pod-list" aria-label="POD directory"></div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      mountChrome('explore');
      const data = getMergedData();

      const showPodToast = () => showToast('POD scheduling is look-only in this prototype.');
      document.getElementById('pod-list').innerHTML = [
        ...data.pods.map((pod) => `
        <article class="mini-card">
          <span class="pod-dept">${pod.department || 'Cross-team'}</span>
          <h3>${pod.name}</h3>
          <p>${pod.summary}</p>
          <div class="avatar-stack" aria-hidden="true">
            <span>SC</span><span>DK</span>
          </div>
          <p class="explore-panel__sub" style="margin:8px 0 0 0;">${pod.members} members · ${pod.cadence}</p>
          <div class="pod-actions">
            <button type="button" class="btn-secondary pod-action">Join POD</button>
            <button type="button" class="btn-text pod-action">Join as observer</button>
          </div>
        </article>
      `),
        `<div class="pod-create" aria-label="Create new POD placeholder">
          <span class="pod-create__icon" aria-hidden="true">+</span>
          <p class="pod-create__title">Create new POD</p>
          <p class="pod-create__desc">Start an interest group around a topic you want to learn together.</p>
        </div>`
      ].join('');

      document.getElementById('pod-list').addEventListener('click', (event) => {
        if (event.target.closest('.pod-action')) showPodToast();
      });
    }
  </script>
</body>
</html>
