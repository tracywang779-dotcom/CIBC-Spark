<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark — Your AI Journey</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body class="landing-dashboard">
  <div class="landing-hero-wrap">
    <div class="spark-container">
      <div id="landing-hero-bar"></div>
      <div id="hero-progression"></div>
    </div>
  </div>

  <main class="spark-container">
    <div class="landing-chat-wrap">
      <div class="landing-chat" role="search">
        <span class="landing-chat__icon" aria-hidden="true">&#10024;</span>
        <div class="landing-chat__copy">
          <span class="landing-chat__prompt">What do you want to work on today?</span>
          <span class="landing-chat__hint">Ask Spark to draft, summarize, or analyze&hellip;</span>
        </div>
        <button type="button" class="landing-chat__submit" aria-label="Send (demo layout only)">&uarr;</button>
      </div>
    </div>

    <div class="landing-dashboard-grid">
      <div id="skill-preview"></div>
      <div class="landing-sidebar">
        <div id="wins-panel"></div>
        <div id="upcoming-panel"></div>
      </div>
    </div>

    <div id="explore-shortcuts"></div>

    <a href="trust-center.html" class="landing-hint" aria-label="Go to Trust Center">
      <span class="landing-hint__copy">
        <span class="landing-hint__icon" aria-hidden="true">&#128737;</span>
        <span>
          <span class="landing-hint__title">Need to check what&rsquo;s allowed?</span>
          <span class="landing-hint__desc">Visit the Trust Center for pledges, do&rsquo;s and don&rsquo;ts, the policy chatbot, and document resources.</span>
        </span>
      </span>
      <span class="landing-hint__arrow" aria-hidden="true">&rarr;</span>
    </a>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      mountChrome('home', { skipNav: true });
      document.getElementById('landing-hero-bar').innerHTML = renderLandingHeroBar();
      initNavAvatarDropdown();

      const data = getMergedData();
      const stats = getProfileStats(user);
      const progression = getProgressionView(user, stats);
      const runtime = getRuntime();
      const completedIds = runtime.skillLabCompleted || [];
      const firstName = user.name.split(' ')[0];
      const dayStreak = (user.wins && user.wins.dayStreak) || 0;

      document.getElementById('hero-progression').innerHTML = renderHeroProgression(user, progression, data.championReward);
      document.querySelector('#welcome').textContent = `Welcome back, ${firstName}.`;

      document.getElementById('skill-preview').innerHTML = renderSkillLabPreview(data.skillLabExercises, completedIds);
      document.getElementById('wins-panel').innerHTML = renderDashboardWins(stats, dayStreak);
      document.getElementById('upcoming-panel').innerHTML = renderUpcomingEvents(data.events);
      document.getElementById('explore-shortcuts').innerHTML = renderLandingNavShortcuts();

      bindChampionPopoverHandlers();
    }
  </script>
</body>
</html>
