<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark — Pledge</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/ui-v2.css" />
  <style>
    .page { padding: var(--space-10) 0 var(--space-12) 0; }
    .page-title { font-size: 42px; font-weight: 600; line-height: 1.25; margin: 0 0 var(--space-6) 0; }
    .section-title { font-size: 36px; font-weight: 600; line-height: 1.3; margin: 0 0 var(--space-4) 0; }

    /* Success banner — shared styles in tokens.css (.success-banner) */

    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-card);
      padding: var(--space-6);
      box-shadow: var(--shadow-card);
    }
    .card--accent { border-top: 3px solid var(--cibc-red); }

    .enterprise-text { font-size: 24px; line-height: 1.5; color: var(--gray-900); margin: var(--space-2) 0 var(--space-4) 0; max-width: 65ch; }
    .meta { font-size: 16px; color: var(--gray-500); margin: 0; }
    .eyebrow { font-size: 15px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--gray-500); margin: 0; }

    /* Department selector */
    .dept-tabs { display: flex; gap: var(--space-2); flex-wrap: wrap; margin: var(--space-8) 0 var(--space-5) 0; }
    .dept-tab {
      padding: 8px 16px;
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      background: var(--white);
      color: var(--gray-700);
      font-size: 16px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: var(--transition-base);
    }
    .dept-tab:hover:not(.active) { border-color: var(--gray-400); background: var(--gray-50); }
    .dept-tab.active { background: var(--cibc-red); border-color: var(--cibc-red); color: var(--white); }

    .pledge-head { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--space-4); }
    .manager-name { font-size: 30px; font-weight: 600; color: var(--gray-900); margin: 0; }
    .manager-title { font-size: 16px; color: var(--gray-500); margin: var(--space-1) 0 0 0; }
    .pledge-statement { font-size: 24px; line-height: 1.55; color: var(--gray-900); margin: var(--space-5) 0; max-width: 65ch; }

    .task-group { margin-top: var(--space-5); }
    .task-group h3 { font-size: 16px; font-weight: 600; color: var(--gray-700); margin: 0 0 var(--space-2) 0; }
    .task-list { display: flex; flex-wrap: wrap; gap: var(--space-2); list-style: none; padding: 0; margin: 0; }
    .task-pill {
      display: inline-block;
      padding: 4px 10px;
      background: var(--gray-100);
      color: var(--gray-700);
      border-radius: 6px;
      font-size: 15px;
      font-weight: 500;
    }

    .pledge-actions { display: flex; gap: var(--space-2); flex-shrink: 0; }
    .btn-secondary, .btn-primary-sm {
      display: inline-block;
      padding: 8px 14px;
      border-radius: var(--radius-button);
      font-weight: 500;
      font-size: 16px;
      font-family: inherit;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
      transition: var(--transition-base);
    }
    .btn-secondary {
      background: var(--white);
      color: var(--gray-900);
      border: 1px solid var(--gray-200);
    }
    .btn-secondary:hover { background: var(--gray-50); border-color: var(--gray-400); }
    .btn-primary-sm {
      background: var(--cibc-red);
      color: var(--white);
      border: 1px solid var(--cibc-red);
    }
    .btn-primary-sm:hover { background: var(--cibc-red-dark); border-color: var(--cibc-red-dark); }

    /* Trust Center footer pointer */
    .tc-pointer {
      margin-top: var(--space-10);
      padding-top: var(--space-6);
      border-top: 1px solid var(--gray-200);
      font-size: 16px;
      color: var(--gray-500);
    }
    .tc-pointer a { color: var(--cibc-red); font-weight: 500; text-decoration: none; }
    .tc-pointer a:hover { text-decoration: underline; }
  </style>
</head>
<body class="ui-v2">
  <div id="nav"></div>

  <main class="spark-container page">
    <div class="success-banner panel-hidden" id="banner" role="status">
      <span aria-hidden="true">&#10003;</span>
      <span class="success-banner__text" id="banner-text"></span>
    </div>

    <h1 class="page-title">Pledge</h1>

    <!-- Layer 1 — Enterprise pledge -->
    <section class="card card--accent" aria-labelledby="enterprise-label">
      <p class="eyebrow" id="enterprise-label">CIBC Enterprise Pledge</p>
      <p class="enterprise-text" id="enterprise-text">&hellip;</p>
      <p class="meta" id="enterprise-meta"></p>
    </section>

    <!-- Layer 2 — Department pledges -->
    <section aria-labelledby="dept-heading">
      <h2 class="section-title" id="dept-heading" style="margin-top: var(--space-8);">Department pledges</h2>
      <div class="dept-tabs" id="dept-tabs" role="tablist"></div>
      <div class="card" id="dept-panel" role="tabpanel"></div>
    </section>

    <!-- Pointer to Trust Center (DESIGN_LOGIC 4.2.3) -->
    <p class="tc-pointer">
      Need to check the rules for a specific task, or ask a question?
      <a href="trust-center.html">Go to Trust Center &rarr;</a>
    </p>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      mountChrome(null);

      const DEPARTMENTS = ['Operational', 'Risk', 'Finance', 'Technology'];

      // Enterprise pledge (Layer 1)
      const data = getMergedData();
      const enterprise = data.pledges.enterprise;
      document.getElementById('enterprise-text').textContent = enterprise.text;
      document.getElementById('enterprise-meta').textContent = `Last updated ${formatDate(enterprise.lastUpdated)}`;

      // Confirmation banner after a save (DESIGN_LOGIC 6.8)
      const params = new URLSearchParams(window.location.search);
      if (params.get('updated') === '1') {
        showSuccessBanner('Your pledge has been updated.', {
          targetId: 'banner',
          hideClass: 'panel-hidden'
        });
      }

      // Department selector — pre-select the user's own department.
      const tabsEl = document.getElementById('dept-tabs');
      let selectedDept = DEPARTMENTS.includes(user.department) ? user.department : 'Operational';

      DEPARTMENTS.forEach((dept) => {
        const tab = document.createElement('button');
        tab.className = 'dept-tab';
        tab.textContent = dept;
        tab.setAttribute('role', 'tab');
        tab.addEventListener('click', () => {
          selectedDept = dept;
          renderTabs();
          renderDeptPanel();
        });
        tab.dataset.dept = dept;
        tabsEl.appendChild(tab);
      });

      function renderTabs() {
        Array.from(tabsEl.children).forEach((tab) => {
          const isActive = tab.dataset.dept === selectedDept;
          tab.classList.toggle('active', isActive);
          tab.setAttribute('aria-selected', isActive ? 'true' : 'false');
        });
      }

      function renderDeptPanel() {
        const panel = document.getElementById('dept-panel');
        const pledge = getMergedData().pledges.departments[selectedDept];

        if (!pledge) {
          panel.innerHTML = renderEmptyState(
            'Your department\u2019s manager has not published a pledge yet.',
            { icon: '&#128221;' }
          );
          return;
        }

        // Edit/Write buttons only for a manager viewing their OWN department (DESIGN_LOGIC 4.2.5).
        const canEdit = user.role === 'manager' && selectedDept === user.department;
        const editButton = canEdit
          ? `<div class="pledge-actions">
               <a class="btn-primary-sm" href="pledge-edit.html">Edit this pledge</a>
               <a class="btn-secondary" href="pledge-edit.html?mode=new">Write a new pledge</a>
             </div>`
          : '';

        const encouraged = (pledge.encouragedTasks || [])
          .map((t) => `<li class="task-pill">${escapeHtml(t)}</li>`).join('');
        const checkFirst = (pledge.checkFirstTasks || [])
          .map((t) => `<li class="task-pill">${escapeHtml(t)}</li>`).join('');

        panel.innerHTML = `
          <div class="pledge-head">
            <div>
              <p class="manager-name">${escapeHtml(pledge.manager)}</p>
              <p class="manager-title">${escapeHtml(pledge.managerTitle)}</p>
            </div>
            ${editButton}
          </div>
          <p class="pledge-statement">${escapeHtml(pledge.text)}</p>
          <div class="task-group">
            <h3>Tasks I encourage my team to try AI on</h3>
            <ul class="task-list">${encouraged || '<li class="meta">None listed.</li>'}</ul>
          </div>
          <div class="task-group">
            <h3>Tasks I want my team to check with me first</h3>
            <ul class="task-list">${checkFirst || '<li class="meta">None listed.</li>'}</ul>
          </div>
          <p class="meta" style="margin-top: var(--space-5);">Last updated ${formatDate(pledge.lastUpdated)}</p>`;
      }

      renderTabs();
      renderDeptPanel();
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso + 'T00:00:00');
      if (Number.isNaN(d.getTime())) return iso;
      return d.toLocaleDateString('en-CA', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }
  </script>
</body>
</html>
