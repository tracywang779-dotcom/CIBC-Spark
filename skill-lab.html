<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spark — Skill Lab</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/ui-v2.css" />
  <style>
    .skill-lab-split {
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: var(--module-gap);
      align-items: start;
    }
    .exercise-list { display: flex; flex-direction: column; gap: var(--module-gap); }
    .exercise-card {
      display: flex;
      align-items: flex-start;
      gap: var(--space-3);
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: var(--radius-card);
      padding: var(--panel-pad);
      box-shadow: var(--shadow-card);
      text-align: left;
      font-family: inherit;
      width: 100%;
      cursor: pointer;
      transition: var(--transition-base);
    }
    .exercise-card:hover { border-color: var(--cibc-red-light); box-shadow: var(--shadow-card-hover); }
    .exercise-card--done { border-color: var(--success); background: var(--success-bg); }
    .exercise-card__icon { font-size: var(--text-h3); flex-shrink: 0; }
    .exercise-card__body { flex: 1; }
    .exercise-card h3 { font-size: var(--text-body); font-weight: 600; margin: 0 0 var(--space-2); color: var(--gray-900); }
    .exercise-card p { font-size: var(--text-sm); color: var(--gray-500); margin: 0 0 var(--space-3); line-height: 1.5; }
    .exercise-meta { display: flex; gap: var(--space-2); flex-wrap: wrap; align-items: center; }
    .duration {
      display: inline-block;
      font-size: var(--text-xs);
      font-weight: 500;
      color: var(--gray-700);
      background: var(--gray-100);
      padding: 4px 10px;
      border-radius: 6px;
    }
    .reward-tag { font-size: var(--text-xs); font-weight: 600; color: var(--cibc-red); }
    .stats-panel {
      position: sticky;
      top: var(--space-6);
    }
    .stats-panel h2 { font-size: var(--text-h3); font-weight: 600; margin: 0 0 var(--space-4); }
    .skill-stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: var(--space-3) 0;
      border-bottom: 1px solid var(--gray-100);
      font-size: var(--text-sm);
    }
    .skill-stat-row:last-child { border-bottom: none; }
    .stat-value { font-weight: 600; color: var(--cibc-red); }
    .stat-stage {
      margin-top: var(--space-4);
      padding: var(--space-4);
      background: var(--gray-50);
      border-radius: var(--radius-button);
      font-size: var(--text-sm);
      color: var(--gray-700);
    }
    @media (max-width: 960px) { .skill-lab-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="ui-v2">
  <div id="nav"></div>

  <main class="spark-container skill-lab-page">
    <a class="explore-back" href="explore.html">&larr; Back to Explore</a>

    <header class="explore-head">
      <h1 class="explore-title">Skill Lab</h1>
      <p class="explore-lead">Short, no-stakes practice with fake scenarios. Complete exercises to grow your AI Journey — only completion is recorded, never your answers.</p>
    </header>

    <div class="skill-lab-split">
      <section class="exercise-list" id="exercises" aria-label="Practice exercises"></section>
      <aside class="stats-panel" id="stats-panel" aria-label="Your practice progress"></aside>
    </div>
  </main>

  <div id="footer"></div>

  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/components.js"></script>
  <script>
    const user = requireAuth();
    if (user) {
      mountChrome('explore');

      const ICONS = { chat: '&#128172;', book: '&#128214;', check: '&#9989;', shield: '&#128737;' };

      const renderPage = () => {
        const data = getMergedData();
        const completed = getRuntime().skillLabCompleted || [];
        const stats = getProfileStats(user);
        const progression = getProgressionView(user, stats);
        const completedCount = completed.length;
        const total = data.skillLabExercises.length;

        document.getElementById('exercises').innerHTML = data.skillLabExercises.map((exercise) => {
          const done = completed.includes(exercise.id);
          const icon = ICONS[exercise.icon] || '&#127919;';
          return `
            <button type="button" class="exercise-card${done ? ' exercise-card--done' : ''}" data-id="${exercise.id}">
              <span class="exercise-card__icon" aria-hidden="true">${icon}</span>
              <span class="exercise-card__body">
                <h3>${exercise.title}</h3>
                <p>${exercise.description}</p>
                <span class="exercise-meta">
                  <span class="duration">${exercise.duration} &middot; ${exercise.category}</span>
                  <span class="reward-tag">${done ? 'Completed' : exercise.rewardLabel}</span>
                </span>
              </span>
            </button>
          `;
        }).join('');

        document.getElementById('stats-panel').innerHTML = `
          <h2>Your progress</h2>
          <div class="skill-stat-row"><span>Exercises completed</span><span class="stat-value">${completedCount} / ${total}</span></div>
          <div class="skill-stat-row"><span>Day streak</span><span class="stat-value">${(user.wins && user.wins.dayStreak) || 0} &#128293;</span></div>
          <div class="skill-stat-row"><span>Journey points</span><span class="stat-value">${getTotalJourneyPoints(user)}</span></div>
          <div class="stat-stage">
            <strong>Current stage:</strong> ${progression.stage.label}<br />
            ${progression.note}
          </div>
        `;
      };

      document.getElementById('exercises').addEventListener('click', (event) => {
        const card = event.target.closest('.exercise-card');
        if (!card) return;
        const exerciseId = card.dataset.id;
        const exercise = getMergedData().skillLabExercises.find((item) => item.id === exerciseId);
        if (!exercise) return;

        if (isSkillLabExerciseComplete(exerciseId)) {
          showToast('You already completed this exercise.');
          return;
        }

        const added = completeSkillLabExercise(exerciseId);
        if (added) {
          showToast(`Exercise complete. ${exercise.rewardLabel} added to your AI Journey.`);
          renderPage();
        }
      });

      renderPage();

      const params = new URLSearchParams(window.location.search);
      const highlightId = params.get('exercise');
      if (highlightId) {
        const target = document.querySelector(`[data-id="${highlightId}"]`);
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }
  </script>
</body>
</html>
